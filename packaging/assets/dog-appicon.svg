<?xml version="1.0" encoding="UTF-8"?>
<!-- MaxMi app icon: white standing-dog side profile on a black squircle (Minimi-style).
     Standing profile reads as "dog" far more reliably than the old sitting blob:
     elongated back, four legs, a defined snout, a folded ear, and an upward tail. -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2b2e"/>
      <stop offset="1" stop-color="#0e0e10"/>
    </linearGradient>
  </defs>
  <rect x="96" y="96" width="832" height="832" rx="196" ry="196" fill="url(#bg)"/>

  <!-- WHITE DOG (standing side profile, facing right). One unioned silhouette. -->
  <g fill="#ffffff">
    <!-- torso: long horizontal body, the key "dog not rodent" cue -->
    <rect x="300" y="440" width="380" height="170" rx="85"/>
    <!-- chest/shoulder rounding into the neck -->
    <ellipse cx="640" cy="470" rx="110" ry="120"/>
    <!-- rear haunch -->
    <ellipse cx="330" cy="520" rx="110" ry="120"/>
    <!-- neck rising to the head -->
    <rect x="620" y="320" width="120" height="180" rx="55" transform="rotate(18 680 410)"/>
    <!-- head -->
    <circle cx="740" cy="320" r="92"/>
    <!-- snout: longer + tapered, projecting down-right (clear dog muzzle) -->
    <path d="M812 300
             q 96 8 116 60
             q 8 30 -28 44
             l -96 20
             q -40 4 -44 -34
             z"/>
    <!-- folded drop ear: broad and hanging down the back of the head (not a tall spike) -->
    <path d="M700 268
             q -44 -34 -30 -92
             q 10 -34 46 -24
             q 44 14 60 66
             q 12 44 -18 74
             q -34 22 -58 -30 z"/>
    <!-- four legs -->
    <rect x="330" y="590" width="66" height="180" rx="30"/>
    <rect x="420" y="600" width="60" height="170" rx="28"/>
    <rect x="560" y="600" width="60" height="170" rx="28"/>
    <rect x="640" y="590" width="66" height="180" rx="30"/>
    <!-- tail sweeping up and back -->
    <path d="M300 470
             q -70 -20 -104 -78
             q -16 -30 12 -48
             q 26 -14 46 16
             q 26 42 62 58
             q 26 12 -16 52 z"/>
  </g>

  <!-- eye + nose as negative space -->
  <g fill="#0e0e10">
    <circle cx="748" cy="300" r="15"/>
    <circle cx="910" cy="352" r="14"/>
  </g>
</svg>
