<?xml version="1.0" encoding="UTF-8"?>
<!-- MaxMi app icon: a minimal, front-facing dog head on a graphite squircle. -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#292a30"/>
      <stop offset="1" stop-color="#0c0d11"/>
    </linearGradient>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#bg)"/>
  <rect x="76" y="76" width="872" height="872" rx="212" fill="none"
        stroke="#ffffff" stroke-opacity="0.07" stroke-width="4"/>

  <!-- Long, soft ears make the silhouette read as a dog at a glance. -->
  <path d="M376 330
           C326 272 244 282 206 350
           C168 418 212 542 292 648
           C326 692 380 670 386 616
           L406 414
           C410 380 400 352 376 330 Z"
        fill="#ffffff"/>
  <path d="M648 330
           C698 272 780 282 818 350
           C856 418 812 542 732 648
           C698 692 644 670 638 616
           L618 414
           C614 380 624 352 648 330 Z"
        fill="#ffffff"/>

  <!-- One uncomplicated head shape, narrowed gently into the muzzle. -->
  <path d="M512 246
           C622 246 690 326 684 436
           C680 518 662 614 608 682
           C566 734 458 734 416 682
           C362 614 344 518 340 436
           C334 326 402 246 512 246 Z"
        fill="#ffffff"/>

  <g fill="#101116">
    <circle cx="438" cy="454" r="18"/>
    <circle cx="586" cy="454" r="18"/>
    <path d="M478 528
             C478 506 546 506 546 528
             C546 554 530 568 512 568
             C494 568 478 554 478 528 Z"/>
  </g>
  <path d="M512 566 V588
           M512 588 C492 610 472 612 458 596
           M512 588 C532 610 552 612 566 596"
        fill="none" stroke="#101116" stroke-width="13"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
