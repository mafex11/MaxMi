<?xml version="1.0" encoding="UTF-8"?>
<!-- MaxMi product mark: a continuous memory ribbon forming an M. -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#25243a"/>
      <stop offset="0.48" stop-color="#12131f"/>
      <stop offset="1" stop-color="#08090f"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#54e7ff"/>
      <stop offset="0.48" stop-color="#8c7cff"/>
      <stop offset="1" stop-color="#d66cff"/>
    </linearGradient>
    <radialGradient id="highlight" cx="0.25" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#background)"/>
  <rect x="64" y="64" width="896" height="896" rx="224" fill="url(#highlight)"/>
  <rect x="76" y="76" width="872" height="872" rx="212" fill="none"
        stroke="#ffffff" stroke-opacity="0.08" stroke-width="4"/>

  <!-- A single continuous ribbon: local memory flowing into a strong M. -->
  <path d="M286 704 V382
           C286 316 360 292 404 344
           L512 486
           L620 344
           C664 292 738 316 738 382
           V704"
        fill="none" stroke="#080912" stroke-opacity="0.56" stroke-width="142"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M286 704 V382
           C286 316 360 292 404 344
           L512 486
           L620 344
           C664 292 738 316 738 382
           V704"
        fill="none" stroke="url(#ribbon)" stroke-width="112"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- The spark is the moment ambient context becomes useful memory. -->
  <path d="M512 214 L534 258 L578 280 L534 302 L512 346 L490 302 L446 280 L490 258 Z"
        fill="#ffffff"/>
</svg>
